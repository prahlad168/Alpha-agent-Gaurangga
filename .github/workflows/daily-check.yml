# Alpha Gaurangga - Daily Development Workflow
name: Daily Check

on:
  # Run every day at 06:00 UTC (13:00 WIB)
  schedule:
    - cron: '0 6 * * *'
  
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Daily Report
        run: |
          echo "📊 Alpha Gaurangga Daily Check"
          echo "Date: $(date)"
          echo "---"
          echo "Files modified:"
          git log --oneline -5
          echo "---"
          echo "Repository status:"
          ls -la
